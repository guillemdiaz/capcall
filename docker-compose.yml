services:
  web:
    build: ./backend
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/code
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: capcall-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

  redis:
    image: redis:8-alpine
    container_name: capcall-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: